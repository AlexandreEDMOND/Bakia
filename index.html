<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bakia – Analyse Chess.com</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #111827;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* ── Header ── */
    h1 { font-size: 2rem; color: #f0c040; margin-bottom: 4px; }
    .subtitle { color: #6b7280; margin-bottom: 28px; font-size: .9rem; }

    /* ── Search ── */
    .search { display:flex; gap:8px; width:100%; max-width:480px; margin-bottom:20px; }
    .search input {
      flex:1; padding:12px 16px; border-radius:8px;
      border:1px solid #374151; background:#1f2937; color:#e5e7eb; font-size:1rem;
    }
    .search input:focus { outline:none; border-color:#f0c040; }
    .search button {
      padding:12px 20px; border-radius:8px; border:none;
      background:#f0c040; color:#111827; font-weight:700; font-size:1rem; cursor:pointer;
      transition:opacity .2s;
    }
    .search button:hover { opacity:.85; }
    .search button:disabled { opacity:.45; cursor:default; }

    /* ── Status ── */
    #status { color:#6b7280; margin-bottom:14px; min-height:20px; font-size:.9rem; }
    #status.error { color:#f87171; }

    /* ── Profile banner ── */
    #profileBanner { width:100%; max-width:680px; margin-bottom:18px; }
    .profile-inner {
      background:#1f2937; border-radius:12px; padding:16px 20px;
      display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
    }
    .profile-left { display:flex; align-items:center; gap:14px; }
    .avatar { width:56px; height:56px; border-radius:50%; object-fit:cover; border:2px solid #374151; }
    .avatar-placeholder {
      width:56px; height:56px; border-radius:50%;
      background:#374151; display:flex; align-items:center; justify-content:center; font-size:1.6rem;
    }
    .profile-name { font-weight:700; font-size:1.05rem; display:flex; align-items:center; gap:6px; }
    .player-title { font-size:.85rem; font-weight:700; background:#1a1a2e; padding:1px 5px; border-radius:3px; }
    .profile-sub  { font-size:.78rem; color:#9ca3af; margin-top:2px; }
    .profile-ratings { display:flex; gap:8px; flex-wrap:wrap; }
    .rating-chip {
      background:#111827; border-radius:8px; padding:8px 12px;
      display:flex; flex-direction:column; align-items:center; min-width:64px;
    }
    .rc-label { font-size:.68rem; color:#6b7280; text-transform:uppercase; letter-spacing:.05em; }
    .rc-val   { font-weight:700; font-size:1rem; color:#f0c040; }
    .rc-best  { font-size:.7rem; color:#9ca3af; }

    /* ── Game list ── */
    .games { width:100%; max-width:680px; display:flex; flex-direction:column; gap:8px; }
    .game-card {
      background:#1f2937; border-radius:10px; padding:12px 16px;
      border-left:4px solid #4b5563;
      display:flex; align-items:center; gap:12px;
      cursor:pointer; transition:background .15s, transform .1s;
    }
    .game-card:hover { background:#263348; transform:translateX(2px); }
    .game-card.win  { border-left-color:#4ade80; }
    .game-card.loss { border-left-color:#f87171; }
    .game-card.draw { border-left-color:#fbbf24; }

    .card-dot { width:22px; height:22px; border-radius:50%; border:2px solid #4b5563; flex-shrink:0; }
    .card-dot.white { background:#f0f0f0; }
    .card-dot.black { background:#1a1a2e; }
    .card-body { flex:1; min-width:0; }
    .card-players { font-weight:600; font-size:.92rem; display:flex; align-items:baseline; gap:8px; }
    .card-ratings { font-weight:400; font-size:.78rem; color:#9ca3af; }
    .card-meta    { font-size:.76rem; color:#6b7280; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-right   { text-align:right; flex-shrink:0; }
    .card-result  { font-weight:700; font-size:.9rem; }
    .win  .card-result { color:#4ade80; }
    .loss .card-result { color:#f87171; }
    .draw .card-result { color:#fbbf24; }
    .card-acc { font-size:.72rem; color:#9ca3af; margin-top:2px; }

    /* ── Overlay & Modal ── */
    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.8);
      display:flex; align-items:center; justify-content:center;
      z-index:100; padding:16px;
      opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .overlay.open { opacity:1; pointer-events:all; }
    .modal {
      background:#1f2937; border-radius:14px;
      width:100%; max-width:640px; max-height:92vh; overflow-y:auto;
      padding:26px; position:relative;
      transform:translateY(20px); transition:transform .2s;
    }
    .overlay.open .modal { transform:translateY(0); }
    .modal-close {
      position:absolute; top:14px; right:16px;
      background:none; border:none; color:#6b7280; font-size:1.3rem; cursor:pointer;
    }
    .modal-close:hover { color:#e5e7eb; }

    /* ── Modal internals ── */
    .modal-banner {
      border-radius:8px; padding:10px 16px; margin-bottom:20px;
      font-weight:700; font-size:1rem; display:flex; align-items:center; gap:8px;
    }
    .modal-banner.win  { background:#052e16; color:#4ade80; }
    .modal-banner.loss { background:#2d0a0a; color:#f87171; }
    .modal-banner.draw { background:#271f00; color:#fbbf24; }

    .players-row { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
    .player {
      flex:1; background:#111827; border-radius:10px; padding:14px; text-align:center;
    }
    .player.is-me { border:1px solid #374151; }
    .piece { font-size:1.7rem; display:block; margin-bottom:4px; }
    .p-name { font-weight:700; font-size:.95rem; }
    .p-elo  { font-size:.82rem; color:#9ca3af; margin-top:2px; }
    .elo-diff { font-size:.75rem; }
    .p-res  { font-size:.78rem; margin-top:6px; font-weight:600; }
    .res-win     { color:#4ade80; }
    .res-loss    { color:#f87171; }
    .res-draw    { color:#fbbf24; }
    .res-neutral { color:#9ca3af; }
    .vs { font-size:1rem; color:#6b7280; font-weight:700; flex-shrink:0; }

    /* ── Accuracy ── */
    .section-title { font-size:.75rem; color:#9ca3af; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
    .acc-row { display:flex; gap:10px; margin-bottom:18px; }
    .acc-block { flex:1; background:#111827; border-radius:8px; padding:12px; }
    .ab-label { font-size:.72rem; color:#6b7280; margin-bottom:6px; }
    .ab-val { font-size:1.4rem; font-weight:700; margin-bottom:6px; }
    .ab-val.high   { color:#4ade80; }
    .ab-val.medium { color:#fbbf24; }
    .ab-val.low    { color:#f87171; }
    .ab-val.na     { color:#6b7280; }
    .ab-bar { background:#1f2937; border-radius:4px; height:6px; overflow:hidden; }
    .ab-fill { height:100%; border-radius:4px; }
    .ab-fill.high   { background:#4ade80; }
    .ab-fill.medium { background:#fbbf24; }
    .ab-fill.low    { background:#f87171; }

    /* ── Info grid ── */
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:18px; }
    .info-cell { background:#111827; border-radius:8px; padding:10px 12px; }
    .ic-label { font-size:.68rem; color:#6b7280; text-transform:uppercase; letter-spacing:.05em; margin-bottom:2px; }
    .ic-val   { font-size:.88rem; font-weight:600; }

    /* ── Stockfish analysis ── */
    .analyze-btn {
      width:100%; padding:12px; border-radius:8px; border:1px solid #374151;
      background:#111827; color:#f0c040; font-size:.95rem; font-weight:600;
      cursor:pointer; margin-bottom:14px; transition:background .15s;
    }
    .analyze-btn:hover:not(:disabled) { background:#1f2937; }
    .analyze-btn:disabled { opacity:.5; cursor:default; }
    .analysis-progress { padding:12px; background:#111827; border-radius:8px; }
    .prog-bar { background:#1f2937; border-radius:4px; height:6px; margin-bottom:8px; overflow:hidden; }
    .prog-fill { height:100%; background:#f0c040; border-radius:4px; transition:width .3s; }
    .prog-label { font-size:.8rem; color:#9ca3af; }
    .analysis-error { color:#f87171; font-size:.85rem; padding:10px; }

    .eval-graph { width:100%; height:auto; border-radius:6px; margin-bottom:16px; display:block; }

    .analysis-summary { display:flex; gap:12px; margin-bottom:16px; }
    .as-col { flex:1; background:#111827; border-radius:8px; padding:12px; }
    .as-title { font-size:.75rem; color:#9ca3af; text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; }
    .s-badge {
      display:inline-block; font-size:.72rem; font-weight:600; padding:2px 7px;
      border-radius:10px; border:1px solid; margin:2px 2px 2px 0;
    }

    .move-table-wrap { max-height:240px; overflow-y:auto; margin-bottom:4px; }
    .move-table { width:100%; border-collapse:collapse; font-size:.8rem; }
    .move-table th { background:#111827; color:#6b7280; padding:6px 8px; text-align:left; font-size:.7rem; text-transform:uppercase; position:sticky; top:0; }
    .mt-row:nth-child(even) { background:#111827; }
    .mt-row td { padding:5px 8px; }
    .mt-num  { color:#6b7280; width:28px; }
    .mt-white { color:#f0f0f0; font-weight:600; }
    .mt-black { color:#9ca3af; font-weight:600; }
    .mt-cls  { font-weight:600; font-size:.75rem; }
    .mt-loss { color:#f97316; font-size:.75rem; }
    .mt-eval { color:#9ca3af; font-family:monospace; font-size:.75rem; }

    /* ── Moves list ── */
    .moves-list {
      background:#111827; border-radius:8px; padding:12px 14px;
      font-family:'Courier New', monospace; font-size:.8rem; line-height:1.8;
      max-height:140px; overflow-y:auto; color:#d1d5db;
      word-break:break-all; margin-bottom:14px;
    }
    .mv-num  { color:#6b7280; }
    .mv-w    { color:#f0f0f0; }
    .mv-b    { color:#9ca3af; }
    .move-clk { font-size:.68rem; color:#4b5563; margin:0 3px; }

    .view-link {
      display:block; text-align:center; padding:12px; border-radius:8px;
      background:#111827; color:#60a5fa; text-decoration:none; font-weight:600; font-size:.9rem;
      transition:background .15s;
    }
    .view-link:hover { background:#1f2937; }

    /* ── History panel ── */
    .history-panel {
      width:100%; max-width:680px; margin-bottom:18px;
    }
    .hp-header {
      font-size:.7rem; color:#6b7280; text-transform:uppercase; letter-spacing:.06em;
      margin-bottom:8px;
    }
    .hp-list { display:flex; gap:8px; flex-wrap:wrap; }
    .hp-chip {
      display:flex; align-items:center; gap:8px;
      background:#1f2937; border-radius:10px; padding:8px 12px;
      cursor:pointer; border:1px solid #374151;
      transition:background .15s, border-color .15s;
    }
    .hp-chip:hover { background:#263348; border-color:#4b5563; }
    .hp-chip.hp-active { border-color:#f0c040; }
    .hp-avatar {
      width:30px; height:30px; border-radius:50%; object-fit:cover;
      border:1px solid #374151; flex-shrink:0;
    }
    .hp-avatar-ph {
      width:30px; height:30px; border-radius:50%;
      background:#374151; display:flex; align-items:center; justify-content:center;
      font-size:.9rem; flex-shrink:0;
    }
    .hp-info { min-width:0; }
    .hp-name { font-size:.82rem; font-weight:600; white-space:nowrap; }
    .hp-date { font-size:.68rem; color:#6b7280; margin-top:1px; }

    /* ── Refresh btn & cache notice ── */
    .refresh-btn {
      background:none; border:1px solid #374151; color:#9ca3af;
      border-radius:6px; padding:2px 8px; font-size:.75rem; cursor:pointer;
      margin-left:8px; transition:background .15s;
    }
    .refresh-btn:hover { background:#1f2937; color:#e5e7eb; }
    .cache-notice {
      margin-top:10px; font-size:.75rem; color:#6b7280;
      text-align:center; padding:6px;
      border:1px dashed #374151; border-radius:6px;
    }
  </style>
</head>
<body>

<h1>♟ Bakia</h1>
<p class="subtitle">Analyse de parties Chess.com avec Stockfish</p>

<div class="search">
  <input id="usernameInput" type="text" placeholder="Pseudo Chess.com…" />
  <button id="searchBtn" onclick="search()">Rechercher</button>
</div>

<div id="historyPanel" class="history-panel" style="display:none">
  <div class="hp-header">Profils analysés</div>
  <div id="historyList" class="hp-list"></div>
</div>

<div id="status"></div>
<div id="profileBanner"></div>
<div id="games" class="games"></div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
